      { n: "rangedCritChance", s: "Ranged", t: ["Offense", "Damage"] },

      { n: "rangedLifesteal", s: "Ranged", t: ["Healing"] },
      { n: "rangedMaxHit", s: "Ranged", t: ["Offense", "Damage"] },
      { n: "rangedMaxHitAgainstMagic", s: "Ranged", t: ["Offense", "Damage"] },
      { n: "rangedMinHitBasedOnMaxHit", s: "Ranged", t: ["Offense", "Damage"] },
      { n: "rangedMinHitBasedOnMaxHitSlayerTask", s: "Ranged", t: ["Offense", "Damage", "Slayer"] },
      { n: "rangedProtection", s: "Any", t: ["Defense"] },
      { n: "rangedStrengthBonus", s: "Ranged", t: ["Offense", "Damage"] },
      { n: "rangedStrengthBonusPer8Ranged", s: "Ranged", t: ["Offense", "Damage"] },
      { n: "rangedStrengthBonusWith2HWeapon", s: "Ranged", t: ["Offense", "Damage"] },
      { n: "rawReflectDamage", s: "Any", t: ["Defense", "Damage"] },
      { n: "rebirthChance", s: "Any", t: ["Utility"] },
      { n: "redemptionHealing", s: "Any", t: ["Healing"] },
      { n: "redemptionThreshold", s: "Any", t: ["Healing"] },
      { n: "reflectDamage", s: "Any", t: ["Defense", "Damage"] },
      { n: "regenPerDamageTaken", s: "Any", t: ["Healing", "Damage"] },
      { n: "resistance", s: "Any", t: ["Defense", "Resistance"] },
      { n: "rolledReflectDamage", s: "Any", t: ["Defense", "Damage"] },
      { n: "runePreservationChance", s: "Magic", t: ["Utility"] },
      { n: "seedDropConversionChance", s: "Any", t: ["Utility", "Loot"] },
      { n: "selfDamageOnHitBasedOnCurrentHitpoints", s: "Any", t: ["Defense", "Damage"] },
      { n: "slashAttackBonus", s: "Melee", t: ["Offense", "Accuracy"] },
      { n: "slayerCoinsPerMagicDamageSlayerTask", s: "Magic", t: ["Utility", "Loot", "Slayer"] },
      { n: "slayerTaskCost", s: "Any", t: ["Utility", "Slayer"] },
      { n: "slayerTaskExtensionCost", s: "Any", t: ["Utility", "Slayer"] },
      { n: "slayerTaskLength", s: "Any", t: ["Utility", "Slayer"] },

      { n: "stunDurationIncreaseChance", s: "Any", t: ["Offense", "Effect"] },
      { n: "summoningAttackInterval", s: "Summoning", t: ["Offense"] },
      { n: "summoningAttackLifesteal", s: "Summoning", t: ["Healing"] },
      { n: "summoningChargePreservationChance", s: "Summoning", t: ["Utility"] },
      { n: "summoningMaxHit", s: "Summoning", t: ["Offense", "Damage"] },
    ];
    const SC = { Any: "csa", Magic: "csm", Melee: "csml", Ranged: "csr", Summoning: "css" };
    const TC = { Offense: "cto", Defense: "ctd", Healing: "cth", Utility: "ctu", Prayer: "ctp", Slayer: "ctsl", Accuracy: "ctac", Damage: "ctdm", Evasion: "ctev", Resistance: "ctr", Effect: "ctef", Loot: "ctl" };
    let sf = "all", at = new Set(), and = false, sq = "";
    function render() {
      const q = sq.toLowerCase();
      const rows = D.filter(d => {
        if (sf !== "all" && d.s !== sf) return false;
        if (at.size) {
          const arr = [...at];
          if (and) { if (!arr.every(t => d.t.includes(t))) return false }
          else { if (!arr.some(t => d.t.includes(t))) return false }
        }
        if (q && !d.n.toLowerCase().includes(q)) return false;
        return true;
      });
      document.getElementById("cnt").textContent = rows.length + " modifier" + (rows.length !== 1 ? "s" : "") + " shown";
      document.getElementById("tb").innerHTML = rows.map(d => `<tr><td class="nm">${d.n}</td><td><span class="chip ${SC[d.s]}">${d.s}</span></td><td>${d.t.map(t => `<span class="chip ${TC[t]}">${t}</span>`).join("")}</td></tr>`).join("");
    }
    document.querySelectorAll("[data-g=s]").forEach(b => b.addEventListener("click", () => {
      document.querySelectorAll("[data-g=s]").forEach(x => x.classList.remove("on"));
      b.classList.add("on"); sf = b.dataset.v; render();
    }));
    document.querySelectorAll("[data-g=t]").forEach(b => b.addEventListener("click", () => {
      const v = b.dataset.v;
      at.has(v) ? (at.delete(v), b.classList.remove("on")) : (at.add(v), b.classList.add("on"));
      render();
    }));
    document.getElementById("andm").addEventListener("change", e => { and = e.target.checked; render(); });
    document.getElementById("srch").addEventListener("input", e => { sq = e.target.value; render(); });
    render();</script>
